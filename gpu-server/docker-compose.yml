
version: '3.8'

services:
  video-processor:
    build: .
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - WASABI_ACCESS_KEY=${WASABI_ACCESS_KEY}
      - WASABI_SECRET_KEY=${WASABI_SECRET_KEY}
      - WASABI_ENDPOINT=${WASABI_ENDPOINT}
      - WASABI_REGION=${WASABI_REGION}
      - WASABI_BUCKET=${WASABI_BUCKET}
